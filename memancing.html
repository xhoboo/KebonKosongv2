<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f2d18">
<title>Memancing — Kebun Kosong</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header>
  <div class="hud">
    <div class="xp-group">
      <div class="level-badge fish-level-badge-hud" id="fishLvlBadge">1</div>
      <div class="xp-wrap">
        <div class="xp-bar-bg"><div class="xp-bar-fill fish-xp-bar-fill" id="fishXpFill" style="width:0%"></div></div>
        <div class="xp-label" id="fishXpLabel">XP Pancing: 0 / 200</div>
      </div>
    </div>
    <a class="btn-home-hud" href="index.html" title="Kembali ke Rumah">&#x1F3E1; Rumah</a>
  </div>
</header>

<audio id="bgMusic" src="audio/Harvest Loop.mp3" loop></audio>

<!-- ADD FISH TO POND MODAL -->
<div class="modal-bg" id="addFishModal">
  <div class="modal-box fish-modal-box">
    <div class="fish-modal-title">🐟 Pilih Ikan untuk Kolam</div>
    <div class="fish-bait-list" id="addFishList"></div>
    <div class="modal-btns" style="margin-top:14px">
      <button id="addFishCancelBtn" class="m-cancel">Batal</button>
    </div>
  </div>
</div>

<!-- JORAN CHOOSER MODAL -->
<div class="modal-bg" id="joranChooserModal">
  <div class="modal-box fish-modal-box">
    <div class="fish-modal-title">🎣 Pilih Joran</div>
    <div class="fish-bait-list" id="joranChooserList"></div>
    <div class="modal-btns" style="margin-top:14px">
      <button id="joranChooserCancelBtn" class="m-cancel">Batal</button>
    </div>
  </div>
</div>

<!-- BAIT CHOOSER MODAL -->
<div class="modal-bg" id="baitChooserModal">
  <div class="modal-box fish-modal-box">
    <div class="fish-modal-title">🪱 Pilih Umpan</div>
    <div class="fish-bait-list" id="baitChooserList"></div>
    <div class="modal-btns" style="margin-top:14px">
      <button id="baitChooserCancelBtn" class="m-cancel">Batal</button>
    </div>
  </div>
</div>

<!-- SELL MODAL -->
<div class="modal-bg" id="sellModal">
  <div class="modal-box sell-modal-box">
    <div class="sell-modal-hdr">
      <span class="sell-modal-emoji" id="sellModalEmoji"></span>
      <div>
        <div class="sell-modal-name" id="sellModalName"></div>
        <div class="sell-modal-grade" id="sellModalGrade"></div>
      </div>
    </div>
    <div class="sell-qty-wrap">
      <button id="sellQtyMinus10Btn" class="sell-qty-btn">−10</button>
      <button id="sellQtyMinus1Btn" class="sell-qty-btn">−</button>
      <span class="sell-qty-val" id="sellModalQty">1</span>
      <button id="sellQtyPlus1Btn" class="sell-qty-btn">+</button>
      <button id="sellQtyPlus10Btn" class="sell-qty-btn">+10</button>
    </div>
    <div class="sell-modal-val" id="sellModalValue">🪙 0</div>
    <div class="modal-btns">
      <button id="sellConfirmBtn" class="m-confirm">💰 Jual <span id="sellModalBtnQty">1</span></button>
      <button id="sellConfirmAllBtn" class="m-confirm" style="background:#e65100">Jual Semua</button>
      <button id="sellCancelBtn" class="m-cancel">Batal</button>
    </div>
  </div>
</div>

<!-- ══ PAGE: MEMANCING ══ -->
<div class="page active" id="page-fishing">
  <div class="fishing-page">
    <!-- Left sidebar -->
    <div class="fishing-left">
      <div class="fishing-sidebar">
        <div class="selected-bait-box" id="selectedBaitBox" title="Klik untuk pilih umpan">
          <div class="ssb-emoji" id="fishSsbEmoji">🪱</div>
          <div class="ssb-name" id="fishSsbName">Pilih Umpan</div>
          <div class="ssb-hint">Klik → Pilih Umpan</div>
        </div>
        <div class="selected-bait-box" id="selectedJoranBox" title="Klik untuk pilih joran">
          <div class="ssb-emoji" id="joranSsbEmoji">🎣</div>
          <div class="ssb-name" id="joranSsbName">Joran Otomatis</div>
          <div class="ssb-hint">Klik → Pilih Joran</div>
        </div>
      </div>
      <div class="fish-log panel">
        <div class="panel-title"> Aktivitas</div>
        <div class="log-list" id="fishLogList"></div>
      </div>
    </div>

    <!-- Main content -->
    <div class="fishing-main">
      <!-- Tab lokasi -->
      <div class="fish-loc-tabs">
        <button class="fish-loc-btn active" id="fishTab-sungai">🏞️ Sungai</button>
        <button class="fish-loc-btn"        id="fishTab-danau">🏔️ Danau</button>
        <button class="fish-loc-btn"        id="fishTab-laut">🌊 Laut</button>
        <button class="fish-loc-btn"        id="fishTab-kolam">🐟 Kolam Ikan</button>
      </div>

      <!-- Konten lokasi -->
      <div class="fish-loc-content" id="fishLocContent">
        <!-- dirender oleh JS -->
      </div>
    </div>
  </div>
</div>

<div class="notif" id="notif"></div>

<script src="js/data/plants.js"></script>
<script src="js/data/grades.js"></script>
<script src="js/data/fish.js"></script>
<script src="js/data/bait.js"></script>
<script src="js/weather.js"></script>
<script src="js/data/upgrades.js"></script>
<script src="js/achievements.js"></script>
<script src="js/data/recipes.js"></script>
<script src="js/craft_recipes.js"></script>
<script src="js/game.js"></script>
<script src="js/init-handlers.js"></script>
</body>
</html>
